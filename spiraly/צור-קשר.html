  <style>
    
    /* Premium Spiraly CSS */
    body {
      background-color: #f8fafd;
      margin: 0;
      font-family: 'Assistant', sans-serif;
    }
    .spiraly-hero {
      background: linear-gradient(135deg, var(--navy-deep) 0%, var(--navy) 100%);
      padding: 160px 20px 100px;
      text-align: center;
      color: #fff;
      position: relative;
      overflow: hidden;
    }
    .spiraly-hero::before {
      content: '';
      position: absolute;
      top: -50%; left: -10%;
      width: 50%; height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 60%);
      transform: rotate(30deg);
    }
    .spiraly-hero::after {
      content: '';
      position: absolute;
      bottom: -50%; right: -10%;
      width: 50%; height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 60%);
      transform: rotate(-30deg);
    }
    .spiraly-breadcrumb {
      font-size: 1rem;
      color: rgba(255,255,255,0.8);
      margin-bottom: 20px;
      position: relative;
      z-index: 2;
    }
    .spiraly-breadcrumb a {
      color: var(--gold-light);
      text-decoration: none;
      font-weight: 600;
      transition: color 0.3s ease;
    }
    .spiraly-breadcrumb a:hover {
      color: #fff;
    }
    .spiraly-hero h1 {
      font-family: 'Heebo', sans-serif;
      font-size: clamp(2.5rem, 6vw, 4rem);
      font-weight: 900;
      margin: 0;
      position: relative;
      z-index: 2;
      text-shadow: 0 4px 12px rgba(0,0,0,0.15);
    }
    
    .spiraly-content-wrapper {
      max-width: 900px;
      margin: -60px auto 100px;
      padding: 0 20px;
      position: relative;
      z-index: 10;
    }
    .spiraly-card {
      background: #fff;
      border-radius: 24px;
      padding: 50px 60px;
      box-shadow: 0 20px 40px rgba(14,58,95,0.06), 0 1px 3px rgba(0,0,0,0.02);
      line-height: 1.9;
      font-size: 1.15rem;
      color: #4a5568;
    }
    
    .spiraly-card h2 {
      color: var(--navy-deep);
      font-family: 'Heebo', sans-serif;
      font-size: 2rem;
      margin-top: 50px;
      margin-bottom: 24px;
      padding-right: 16px;
      border-right: 6px solid var(--green);
      border-radius: 2px;
    }
    .spiraly-card h3 {
      color: var(--navy);
      font-family: 'Heebo', sans-serif;
      font-size: 1.5rem;
      margin-top: 40px;
      margin-bottom: 20px;
    }
    .spiraly-card p {
      margin-bottom: 24px;
    }
    .spiraly-card ul, .spiraly-card ol {
      margin-bottom: 30px;
      padding-right: 0;
      list-style: none;
    }
    .spiraly-card li {
      margin-bottom: 14px;
      position: relative;
      padding-right: 32px;
    }
    .spiraly-card li::before {
      content: '✓';
      position: absolute;
      right: 0;
      top: 2px;
      color: #fff;
      background: var(--green);
      width: 20px; height: 20px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      font-weight: bold;
    }
    .spiraly-card img {
      max-width: 100%;
      height: auto;
      border-radius: 16px;
      margin: 30px 0;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }
    .spiraly-card a {
      color: var(--green-dark);
      text-decoration: none;
      font-weight: 600;
      border-bottom: 2px solid transparent;
      transition: all 0.3s ease;
    }
    .spiraly-card a:hover {
      border-bottom-color: var(--green);
    }

    @media(max-width: 768px) {
      .spiraly-card { padding: 30px 24px; }
      .spiraly-hero { padding: 130px 20px 80px; }
    }

  </style>
